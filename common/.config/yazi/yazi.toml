[manager]
ratio = [1, 2, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true

[preview]
tab_size = 2
max_width = 600
max_height = 900
cache_dir = ""
image_filter = "triangle"
image_quality = 75
sixel_fraction = 15
ueberzug_scale = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = 'nvim "$@"', desc = "nvim", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "open", orphan = true },
]
reveal = [
  { run = 'xdg-open "$(dirname "$@")"', desc = "reveal", orphan = true },
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "application/toml", use = "edit" },
  { mime = "application/yaml", use = "edit" },
  { mime = "*/javascript", use = "edit" },
  { mime = "inode/directory", use = "open" },
  { mime = "*", use = "open" },
]

[tasks]
micro_workers = 10
macro_workers = 25
bizarre_retry = 5
image_alloc = 536870912
image_bound = [0, 0]
suppress_preload = false

[log]
enabled = false
