# Reference: https://github.com/i3/i3/blob/next/etc/config
config-version = 2

# borders
after-startup-command = [
	'exec-and-forget borders active_color=0xFF0071CE inactive_color=0xFFFF9900 width=8.0',
]

# normilisation (windows stretch to fill space)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# force new workspaces to start in tiling mode
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# layout
[gaps]
inner.horizontal = 20
inner.vertical = 20
outer.top = 50
outer.bottom = 50
outer.left = 50
outer.right = 50

# monitor rules
[workspace-to-monitor-force-assignment]
'1' = 1
'2' = 1
'3' = 1
'4' = 1
'5' = 1
'6' = 3
'7' = 2

# window rules
[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.window-title-regex-substring = '(Copy|Connect|Move|Info|Pref)'
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run = "layout tiling"

[[on-window-detected]]
if.app-id = 'org.flameshot.Flameshot'
run = "layout floating"
check-further-callbacks = false

# keybindings
[mode.main.binding]

# focus
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

# move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# balance
alt-shift-b = 'balance-sizes'

# layouts
alt-slash = 'layout tiles horizontal vertical'
alt-f = 'fullscreen'
alt-s = 'layout v_accordion'
alt-w = 'layout h_accordion'
alt-shift-space = 'layout floating tiling'

# Workspaces (1-10)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# move node to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'
alt-shift-0 = 'move-node-to-workspace 10'

# management
alt-shift-c = 'reload-config'
alt-comma = 'mode resize'

# resize mode
[mode.resize.binding]
h = 'resize width -100'
j = 'resize height +100'
k = 'resize height -100'
l = 'resize width +100'
enter = 'mode main'
esc = 'mode main'
